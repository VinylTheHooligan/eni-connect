name: Discord Commit Notification

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build embed payload
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pusher.name }}"
          AVATAR="https://github.com/${{ github.event.pusher.name }}.png"
          BRANCH="${{ github.ref_name }}"
          COMMITS_JSON='${{ toJson(github.event.commits) }}'

          EMBEDS="[]"

          for commit in $(jq -c '.[]' <<< "$COMMITS_JSON"); do
            SHA=$(jq -r '.id' <<< "$commit")
            SHORT_SHA=${SHA:0:7}

            # Message commit échappé
            MESSAGE=$(jq -r '.message' <<< "$commit" | jq -Rs .)

            URL=$(jq -r '.url' <<< "$commit")

            # Liste des fichiers modifiés
            FILES=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              $URL | jq -r '.files[] | "- \(.filename) (\(.status))"' | jq -Rs .)

            # Timestamp ISO8601
            TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            # Construction embed
            EMBED=$(jq -n \
              --arg title "Commit $SHORT_SHA" \
              --argjson message "$MESSAGE" \
              --argjson files "$FILES" \
              --arg author "$AUTHOR" \
              --arg avatar "$AVATAR" \
              --arg url "$URL" \
              --arg ts "$TS" \
              '{
                title: $title,
                description: ("**Message :**\n" + ($message|fromjson) + "\n\n**Fichiers :**\n" + ($files|fromjson) + "\n\n[Voir sur GitHub](" + $url + ")"),
                color: 3447003,
                author: { name: $author, icon_url: $avatar },
                footer: { text: "Notification GitHub → Discord" },
                timestamp: $ts
              }')

            EMBEDS=$(jq -c --argjson embed "$EMBED" '. += [$embed]' <<< "$EMBEDS")
          done

          PAYLOAD=$(jq -n \
            --arg content "<@&1477979874806202472>" \
            --argjson embeds "$EMBEDS" \
            '{content: $content, embeds: $embeds}')

          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Send to Discord
        run: |
          curl -H "Content-Type: application/json" \
               -d '${{ steps.build.outputs.payload }}' \
               ${{ secrets.DISCORD_WEBHOOK }}
