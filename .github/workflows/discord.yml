name: Discord Commit Notification

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build embed payload
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTHOR="${{ github.event.pusher.name }}"
          AVATAR="https://github.com/${{ github.event.pusher.name }}.png"
          BRANCH="${{ github.ref_name }}"
          COMMITS_JSON='${{ toJson(github.event.commits) }}'

          EMBEDS="[]"

          for commit in $(jq -c '.[]' <<< "$COMMITS_JSON"); do
            SHA=$(jq -r '.id' <<< "$commit")
            SHORT_SHA=${SHA:0:7}

            # Escape commit message safely
            MESSAGE=$(jq -r '.message' <<< "$commit" | sed 's/"/\\"/g')

            URL=$(jq -r '.url' <<< "$commit")

            # Fetch file list safely
            FILES=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              $URL | jq -r '.files[] | "- \(.filename) (\(.status))"' | sed 's/"/\\"/g')

            # Build embed JSON safely
            EMBED=$(jq -n \
              --arg title "Commit $SHORT_SHA" \
              --arg description "**Message :**\n$MESSAGE\n\n**Fichiers :**\n$FILES\n\n[Voir sur GitHub]($URL)" \
              --arg author "$AUTHOR" \
              --arg avatar "$AVATAR" \
              '{
                title: $title,
                description: $description,
                color: 3447003,
                author: { name: $author, icon_url: $avatar },
                footer: { text: "Notification GitHub → Discord" },
                timestamp: now
              }')

            EMBEDS=$(jq -c --argjson embed "$EMBED" '. += [$embed]' <<< "$EMBEDS")
          done

          # Replace ROLE_ID with your Discord role ID
          PAYLOAD=$(jq -n \
            --arg content "<@&ROLE_ID>" \
            --argjson embeds "$EMBEDS" \
            '{content: $content, embeds: $embeds}')

          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Send to Discord
        run: |
          curl -H "Content-Type: application/json" \
               -d '${{ steps.build.outputs.payload }}' \
               ${{ secrets.DISCORD_WEBHOOK }}