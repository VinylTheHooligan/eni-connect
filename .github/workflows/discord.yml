name: Discord Commit Notifier

on:
  push:
    branches:
      - main
      - master
      - develop
      - "*"   # si tu veux toutes les branches

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          COMMITS: ${{ toJson(github.event.commits) }}
          AUTHOR: ${{ github.event.pusher.name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Commits: $COMMITS"

          # Construction du JSON pour Discord
          PAYLOAD=$(cat <<EOF
          {
            "username": "GitHub Bot",
            "embeds": [
              {
                "title": "📌 Nouveau push sur $REPO",
                "description": "**Auteur :** $AUTHOR\n**Branche :** $BRANCH",
                "color": 5814783,
                "fields": [
                  $(echo $COMMITS | jq -r '
                    map({
                      name: ("📝 " + .id[0:7]),
                      value: ("**Message :** " + .message + "\n**Auteur :** " + .author.name),
                      inline: false
                    }) | join(",")
                  )
                ],
                "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK"
